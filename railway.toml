[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python bot.py"
numReplicas = 1
restartPolicyType = "ON_FAILURE"

[service]
port = 8080

[env]
BOT_TOKEN = "YOUR_BOT_TOKEN_HERE"
ADMIN_IDS = "123456789"
CHECK_DELAY = "4"
BATCH_SIZE = "10"
MAX_FILE_CARDS = "10000"
MAX_CARD_CHECK = "10000"